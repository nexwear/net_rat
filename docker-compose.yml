services:

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: always

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    volumes:
      - ./backend/firmware:/app/firmware
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - MQTT_HOST=mosquitto
      - AUTO_APPROVE_DEVICES=true
    depends_on:
      - postgres
      - mosquitto
    restart: always

  frontend:
    build: ./frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://YOUR_EC2_IP/api
    restart: always

  postgres:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mqttdata:/mosquitto/data
    restart: always

volumes:
  pgdata:
  mqttdata:
