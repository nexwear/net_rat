services:

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: always

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    volumes:
      - ./backend/firmware:/app/firmware
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - MQTT_HOST=mosquitto
      - AUTO_APPROVE_DEVICES=true
      - OTA_PUBLIC_BASE_URL=http://15.206.16.137/api
      - ADMIN_SECRET=${ADMIN_SECRET:-change-me}
      - JWT_SECRET=${JWT_SECRET:-change-me-jwt-secret}
      - SUPER_ADMIN_EMAIL=${SUPER_ADMIN_EMAIL:-admin@nexwear.io}
      - SUPER_ADMIN_PASSWORD=${SUPER_ADMIN_PASSWORD:-Nexwear@2025}
      # FCM (optional): set FIREBASE_SERVICE_ACCOUNT in .env or mount a JSON file
      - FIREBASE_SERVICE_ACCOUNT=${FIREBASE_SERVICE_ACCOUNT:-}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
    depends_on:
      - postgres
      - mosquitto
    restart: always

  frontend:
    build: ./frontend
    environment:
      - VITE_ADMIN_SECRET=${VITE_ADMIN_SECRET:-change-me}
    restart: always

  postgres:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mqttdata:/mosquitto/data
    restart: always

volumes:
  pgdata:
  mqttdata:
