; Garment-line universal node firmware (ESP32 + PN5180)
; One binary — moduleType selected from NVS at runtime.

[platformio]
default_envs = esp32dev

[env]
platform = espressif32 @ ^6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
board_build.filesystem = littlefs
build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DFW_VERSION=\"1.0.44\"
  -DOTA_CHECK_INTERVAL_MS=30000
  -DCURRENT_CAL=20.0f      ; SCT-013-020 = 20 A : 1 V
  -std=gnu++17
lib_deps =
  bblanchon/ArduinoJson@^7.2.0
  ; PN5180 is vendored in lib/PN5180 (patched: bounded BUSY-wait timeouts so a
  ; wedged reader fails fast instead of hanging the sensing task). Do NOT re-add
  ; the upstream git dep — it would reintroduce the unbounded busy loops.

[env:esp32dev]
upload_protocol = esptool
; USB serial flash (first-time / recovery)

[env:esp32dev-ota]
extends = env:esp32dev
board_build.partitions = min_spiffs.csv
upload_protocol = espota
; Set your node IP before OTA upload (or pass --upload-port on CLI)
; upload_port = 192.168.1.100
upload_flags =
  --port=3232
